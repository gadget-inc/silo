apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: silo-autoscaler-webhook
webhooks:
  - name: validate.siloautoscaler.silo.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    clientConfig:
      service:
        name: silo-autoscaler
        namespace: silo-test
        path: /validate-silo-autoscaler
        port: 8443
      caBundle: ""
    rules:
      - apiGroups: ["silo.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["siloautoscalers"]
    failurePolicy: Fail
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: silo-test
