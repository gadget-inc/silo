apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: siloautoscalers.silo.dev
spec:
  group: silo.dev
  names:
    categories: []
    kind: SiloAutoscaler
    plural: siloautoscalers
    shortNames: []
    singular: siloautoscaler
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.replicas
      name: Current
      type: integer
    - jsonPath: .status.orphanedLeaseCount
      name: Orphans
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for SiloAutoscalerSpec via `CustomResource`
        properties:
          spec:
            description: |-
              Spec for the SiloAutoscaler CRD.

              The SiloAutoscaler manages safe scaling of a Silo StatefulSet by adding finalizers to pods and ensuring shard leases are cleanly released before allowing pod deletion to complete.
            properties:
              clusterPrefix:
                description: Cluster prefix used by silo coordination for lease labels (silo.dev/cluster={prefix}).
                type: string
              replicas:
                description: Target replica count. An HPA can modify this via the /scale subresource.
                format: int32
                type: integer
              targetStatefulSet:
                description: Name of the StatefulSet to manage, in the same namespace.
                type: string
            required:
            - clusterPrefix
            - replicas
            - targetStatefulSet
            type: object
          status:
            description: Status of the SiloAutoscaler.
            nullable: true
            properties:
              conditions:
                default: []
                description: Standard Kubernetes-style conditions.
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              orphanedLeaseCount:
                default: 0
                description: Number of orphaned leases currently detected.
                format: int32
                type: integer
              orphanedLeases:
                default: []
                description: Orphaned shard leases currently detected.
                items:
                  properties:
                    detectedAt:
                      type: string
                    holderIdentity:
                      type: string
                    leaseName:
                      type: string
                    shardId:
                      type: string
                  required:
                  - detectedAt
                  - holderIdentity
                  - leaseName
                  - shardId
                  type: object
                type: array
              replicas:
                default: 0
                description: Current replica count read from the StatefulSet.
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: SiloAutoscaler
        type: object
    served: true
    storage: true
    subresources:
      scale:
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
      status: {}

