apiVersion: apps/v1
kind: Deployment
metadata:
  name: silo-autoscaler
  namespace: silo-test
  labels:
    app: silo-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silo-autoscaler
  template:
    metadata:
      labels:
        app: silo-autoscaler
    spec:
      serviceAccountName: silo-autoscaler
      containers:
        - name: controller
          image: silo-autoscaler:latest
          imagePullPolicy: Never
          args: ["--webhook-port=8443"]
          ports:
            - containerPort: 8443
              name: webhook
          env:
            - name: RUST_LOG
              value: "info,silo_autoscaler=debug"
          volumeMounts:
            - name: webhook-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: silo-autoscaler-webhook-certs
