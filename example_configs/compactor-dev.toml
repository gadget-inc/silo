# Local dev silo-compactor config (process-compose).
# Reads silo's shard map from the same etcd instance silo-1/silo-2 use,
# then compacts data at the same fs path silo-1/silo-2 write to.
# NOTE: relative paths resolve from process-compose's CWD (the repo root).

[storage]
backend = "fs"
path = "./tmp/silo-data/%shard%"

[shard_discovery]
backend = "etcd"
cluster_prefix = "silo-dev"
# Routes through toxiproxy (port 12379 → 2379) so dev fault injection works.
etcd_endpoints = ["http://127.0.0.1:12379"]

[coordinator]
mode = "single"
self_pod_name = "compactor-local"
max_shards_per_pod = 12
rebalance_interval = "10s"
worker_restart_backoff = "5s"

[logging]
format = "text"

[metrics]
enabled = true
# silo-1/silo-2 already use 9090/9091; pick 9092 for the dev compactor.
addr = "127.0.0.1:9092"

[compactor_options]
poll_interval = "5s"
max_sst_size = 4194304
max_concurrent_compactions = 2
max_fetch_tasks = 4

# Leveled compaction scheduler. Sized for the bench dataset (~40 MiB total,
# previously settling as size-tiered SR(0) ≈ 40 MiB + two small SRs ≈ 8 MiB).
# Target shape: L3 absorbs the bulk, L1+L2 hold the recent ~8 MiB.
#   L1 target = base                    = 4 MiB
#   L2 target = base × mult             = 16 MiB
#   L3 target = base × mult²            = 64 MiB (effective sink for 40 MiB)
# mult=4 mirrors size-tiered's include_size_threshold default, so per-tier
# growth roughly matches the size-tiered baseline.
[compactor_options.scheduler_options]
level0_file_num_compaction_trigger = "2"
max_bytes_for_level_base = "4194304"
max_bytes_for_level_multiplier = "4.0"
num_levels = "3"
