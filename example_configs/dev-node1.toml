# Config for dev node 1 (process-compose)

[server]
grpc_addr = "127.0.0.1:7450"
dev_mode = true

[coordination]
backend = "etcd"
cluster_prefix = "silo-dev"
lease_ttl_secs = 10
num_shards = 8
etcd_endpoints = ["http://127.0.0.1:12379"]

[tenancy]
enabled = true

[gubernator]
address = "http://localhost:9992"

[webui]
enabled = true
addr = "127.0.0.1:8081"

[database]
backend = "fs"
# use the same data path as the other node to simulate prod-like usage of object storage and compute/storage separation
# NOTE: %shard% must be at a directory boundary (after /) for split/clone to work correctly
path = "./tmp/silo-data/%shard%"

completed_job_expire_s = 1
terminal_job_expire_s = 1
counter_reconciliation_seconds = 3600

[database.slatedb]
# flush memtable to ssts frequently for low latency writes
flush_interval = "1ms"

# roll active memtable into a new l0 sst every 64mb. smaller individual
# flushes complete faster, which matters during shard.close() — db.close()
# has to drain every queued unflushed byte to object storage before it
# returns.
l0_sst_size_bytes = 524288 # 512 kib

# Garbage collection — disabled by default in SlateDB!
[database.slatedb.garbage_collector_options.manifest_options]
interval = "300s"
min_age = "86400s"

[database.slatedb.garbage_collector_options.wal_options]
interval = "300s"
min_age = "1800s"

[database.slatedb.garbage_collector_options.compacted_options]
interval = "300s"
min_age = "86400s"

[database.slatedb.garbage_collector_options.compactions_options]
interval = "300s"
min_age = "86400s"
