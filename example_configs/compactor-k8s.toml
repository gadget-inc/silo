# Production silo-compactor config (k8s Deployment with N replicas).
# Discovers sibling pods via the k8s API (label selector), reads silo's shard
# map from a ConfigMap silo writes/maintains, and runs slatedb's standalone
# compactor for each assigned shard.
#
# POD_NAME and POD_NAMESPACE should be injected via the Downward API:
#
#   env:
#     - name: POD_NAME
#       valueFrom: { fieldRef: { fieldPath: metadata.name } }
#     - name: POD_NAMESPACE
#       valueFrom: { fieldRef: { fieldPath: metadata.namespace } }

[storage]
backend = "gcs"
path = "gs://my-bucket/silo/%shard%"

[shard_discovery]
backend = "k8s_configmap"
cluster_prefix = "silo-prod"
k8s_namespace = "${POD_NAMESPACE}"

[coordinator]
mode = "k8s_deployment"
self_pod_name = "${POD_NAME}"
namespace = "${POD_NAMESPACE}"
pod_label_selector = "app=silo-compactor"
max_shards_per_pod = 12
rebalance_interval = "30s"
worker_restart_backoff = "5s"

[logging]
format = "json"

[compactor_options]
poll_interval = "5s"
max_sst_size = 268435456
max_concurrent_compactions = 4
max_fetch_tasks = 8
