# Config for dev node 2 (process-compose)

[server]
grpc_addr = "127.0.0.1:7451"
dev_mode = true

[coordination]
backend = "etcd"
cluster_prefix = "silo-dev"
lease_ttl_secs = 10
num_shards = 8
etcd_endpoints = ["http://127.0.0.1:12379"]

[tenancy]
enabled = true

[gubernator]
address = "http://localhost:9992"

[webui]
enabled = true
addr = "127.0.0.1:8082"

[database]
backend = "fs"
# use the same data path as the other node to simulate prod-like usage of object storage and compute/storage separation
# NOTE: %shard% must be at a directory boundary (after /) for split/clone to work correctly
path = "./tmp/silo-data/%shard%"

# Submit a full-compaction spec for each shard every N seconds (consumed by the
# standalone silo-compactor). Omit to disable periodic compaction.
periodic_full_compaction_s = 60
# TTL (seconds) applied to non-success terminal jobs' associated records.
terminal_job_expire_s = 900
# TTL (seconds) applied to Succeeded jobs' associated records.
completed_job_expire_s = 60
# Periodically rederive counter values from surviving job rows to correct drift.
counter_reconciliation_seconds = 30

# Garbage collection — disabled by default in SlateDB!
[database.slatedb.garbage_collector_options.manifest_options]
interval = "300s"
min_age = "86400s"

[database.slatedb.garbage_collector_options.wal_options]
interval = "300s"
min_age = "1800s"

[database.slatedb.garbage_collector_options.compacted_options]
interval = "300s"
min_age = "86400s"

[database.slatedb.garbage_collector_options.compactions_options]
interval = "300s"
min_age = "86400s"
