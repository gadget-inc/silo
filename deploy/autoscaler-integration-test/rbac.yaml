apiVersion: v1
kind: ServiceAccount
metadata:
  name: silo
  namespace: silo-autoscaler-test
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: silo-autoscaler
  namespace: silo-autoscaler-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: silo-coordinator
  namespace: silo-autoscaler-test
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: silo-coordinator
  namespace: silo-autoscaler-test
subjects:
  - kind: ServiceAccount
    name: silo
    namespace: silo-autoscaler-test
roleRef:
  kind: Role
  name: silo-coordinator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: silo-autoscaler
  namespace: silo-autoscaler-test
rules:
  - apiGroups: ["silo.dev"]
    resources: ["siloautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["silo.dev"]
    resources: ["siloautoscalers/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["silo.dev"]
    resources: ["siloautoscalers/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: silo-autoscaler
  namespace: silo-autoscaler-test
subjects:
  - kind: ServiceAccount
    name: silo-autoscaler
    namespace: silo-autoscaler-test
roleRef:
  kind: Role
  name: silo-autoscaler
  apiGroup: rbac.authorization.k8s.io
