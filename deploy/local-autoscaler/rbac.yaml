apiVersion: v1
kind: ServiceAccount
metadata:
  name: silo-autoscaler
  namespace: silo-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: silo-autoscaler
rules:
  # SiloAutoscaler CRD instances
  - apiGroups: ["silo.dev"]
    resources: ["siloautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["silo.dev"]
    resources: ["siloautoscalers/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["silo.dev"]
    resources: ["siloautoscalers/scale"]
    verbs: ["get", "patch", "update"]
  # StatefulSets (read and patch replicas)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch", "update"]
  # Leases (read shard leases for orphan detection)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  # Pods (list, watch, and patch for finalizer management)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]
  # Events (emit K8s events for operator visibility)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: silo-autoscaler
subjects:
  - kind: ServiceAccount
    name: silo-autoscaler
    namespace: silo-test
roleRef:
  kind: ClusterRole
  name: silo-autoscaler
  apiGroup: rbac.authorization.k8s.io
